<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>肌タイプ診断</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1+Code:wght@500&family=M+PLUS+Rounded+1c:wght@500&family=Noto+Sans+JP:wght@500;700&family=Noto+Serif+JP:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 背景レイヤー（全画面共通） -->
<div class="bg-full-layer">
  <img src="../assets/bg/bg_full.png" alt="" />
</div>

  <!-- ===== TOP ===== -->
  <div id="screen-top" class="screen active">
    <div class="sparkle-container" id="sparkle-container"></div>
    <div class="top-title-area">
      <img class="top-title-img" src="../assets/images/title.png" alt="今日の盛れ肌おみくじ" />
    </div>
    <div class="top-stage-wrap">
      <img class="stage-bg-img" src="../assets/images/background.png" alt="">
      <div class="chara-group st-c1">
        <img class="top-chara" src="../assets/images/chara03.png" alt="">
        <!-- shadow baked into image -->
      </div>
      <div class="chara-group st-c2">
        <img class="top-chara" src="../assets/images/character01_animation_3x.webp" alt="">
      </div>
      <div class="chara-group st-c3">
        <img class="top-chara" src="../assets/images/chara05.png" alt="">
        <!-- shadow baked into image -->
      </div>
      <div class="chara-group st-c4">
        <img class="top-chara" src="../assets/images/chara02.png" alt="">
      </div>
      <div class="chara-group st-c5">
        <img class="top-chara" src="../assets/images/chara06.png" alt="">
      </div>
      <div class="chara-group st-c6">
        <img class="top-chara" src="../assets/images/chara04.png" alt="">
        <!-- shadow baked into image -->
      </div>
    </div>
    <div class="top-start-wrap">
      <button class="btn-top-start" onclick="startQuiz()">START!</button>
    </div>
  </div>

  <!-- ===== QUIZ ===== -->
  <div id="screen-quiz" class="screen">
    <div id="quiz-body"><!-- JS で生成 --></div>
  </div>

  <!-- ===== SCAN ===== -->
  <div id="screen-scan" class="screen">
    <div class="scan-text-block">
      <p class="scan-text-main">最後に手を入れてください。</p>
      <p class="scan-text-desc">あなたの美のエネルギーを読み解き<br>肌本来が持つ美のポテンシャルと<br>今日の運勢がわかります。</p>
      <p class="scan-text-sub">手を左下の入り口に置いたら「診断」ボタンを押してください。</p>
    </div>
    <div class="scan-hand-icon">
      <img src="../assets/images/hand.svg" alt="" />
    </div>
    <button class="btn-shindan" onclick="confirmScan()">診断</button>
  </div>

  <!-- ===== RESULT ===== -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <div class="result-title-wrap">
        <p class="result-title">診断結果</p>
      </div>
      <div class="result-name-block">
        <p class="result-name" id="result-name"></p>
        <p class="result-tagline" id="result-tagline"></p>
      </div>
    </div>
    <div class="result-body" id="result-body">
      <!-- JS で生成 -->
    </div>
    <div class="result-actions">
      <p class="result-print-hint">今日の運勢と<br>おすすめの商品は印刷をタップ</p>
      <button class="btn-print" onclick="printReceipt(this)">印刷</button>
      <button class="btn-restart" onclick="goToTop()">最初からやり直す</button>
    </div>
  </div>

  <!-- ===== RECEIPT ===== -->
  <div id="screen-receipt" class="screen">

    <!-- 画面表示用コントロール（印刷時は非表示） -->
    <div class="receipt-ctrl no-print">
      <button class="btn-print" onclick="printReceipt()">印刷する</button>
      <button class="btn-back"  onclick="showScreen('screen-result')">← 結果に戻る</button>
    </div>

    <!-- レシートプレビュー（画面用ラッパー） -->
    <div class="receipt-preview-outer no-print">
      <div class="receipt-preview-label">印刷プレビュー（80mm）</div>
      <div class="receipt-preview-inner">
        <div id="receipt-content"><!-- buildReceiptDOM() で生成 --></div>
      </div>
    </div>

    <!-- 印刷専用ターゲット（@media print のみ表示） -->
    <div class="print-only">
      <div id="receipt-print-target"><!-- buildReceiptDOM() で同期 --></div>
    </div>

  </div>

  <script src="../webprnt-test/StarWebPrintBuilder.js"></script>
  <script src="../webprnt-test/StarWebPrintTrader.js"></script>
  <script src="script.js"></script>
</body>
</html>
