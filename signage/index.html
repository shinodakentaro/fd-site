<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLOW vs SMOOTH BATTLE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="s-root">

    <!-- 背景パーティクルステージ -->
    <canvas id="particle-canvas"></canvas>

    <!-- ===== GLOW ZONE (左) ===== -->
    <div class="zone zone-glow">
      <div class="zone-bg-glow"></div>
      <div class="zone-label">
        <span class="zone-icon">✨</span>
        <span class="zone-name">GLOW</span>
        <span class="zone-sub">光・ツヤ感</span>
      </div>
      <div class="zone-crowd" id="glow-crowd"></div>
      <div class="zone-count">
        <span class="zone-num" id="glow-num">0</span>
        <span class="zone-unit">票</span>
      </div>
    </div>

    <!-- ===== CENTER ===== -->
    <div class="center">
      <div class="center-title-bar">
        <span class="center-deco">◆◆◆</span>
        <h1 class="center-title">本日の肌ムードバトル</h1>
        <span class="center-deco">◆◆◆</span>
      </div>

      <!-- パーセントスコア -->
      <div class="score-pct-row">
        <span class="score-pct pct-glow" id="pct-glow">50%</span>
        <span class="score-sep">:</span>
        <span class="score-pct pct-smooth" id="pct-smooth">50%</span>
      </div>

      <!-- バーグラフ -->
      <div class="score-bar-wrap">
        <div class="score-bar-glow"   id="bar-glow"   style="width:50%"></div>
        <div class="score-bar-smooth" id="bar-smooth" style="width:50%"></div>
      </div>

      <div class="vs-badge">VS</div>
      <div class="total-votes" id="total-votes">0 votes</div>

      <!-- 最近の参加者 -->
      <div class="recent-bar">
        <span class="recent-label">✦ 最近の参加 ✦</span>
        <div class="recent-list" id="recent-list"></div>
      </div>
    </div>

    <!-- ===== SMOOTH ZONE (右) ===== -->
    <div class="zone zone-smooth">
      <div class="zone-bg-smooth"></div>
      <div class="zone-label">
        <span class="zone-icon">🌸</span>
        <span class="zone-name">SMOOTH</span>
        <span class="zone-sub">パウダー・なめらか</span>
      </div>
      <div class="zone-crowd" id="smooth-crowd"></div>
      <div class="zone-count">
        <span class="zone-num" id="smooth-num">0</span>
        <span class="zone-unit">票</span>
      </div>
    </div>

  </div><!-- /.s-root -->

  <script src="../shared/vote-store.js"></script>
  <script src="script.js"></script>
</body>
</html>
