<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLOW vs SMOOTH BATTLE</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- 背景レイヤー -->
<div class="bg-display-layer"></div>

<!-- GLOW: キャラ＋吹き出し -->
<img src="../assets/images/G_character1.png" class="sg-chara sg-chara-glow" alt="" />
<img src="../assets/images/G_comment1.png" class="sg-comment sg-comment-glow" alt="" />

<!-- GLOW 票数 -->
<div class="sg-vote sg-vote-glow">
  <span id="glow-num">0</span><span class="sg-unit">票</span>
</div>

<!-- 投票総数（中央の白い円内） -->
<div class="sg-total">
  <span id="total-num">0</span><span class="sg-unit-sm">票</span>
</div>

<!-- SMOOTH: キャラ＋吹き出し -->
<img src="../assets/images/S_comment1.png" class="sg-comment sg-comment-smooth" alt="" />
<img src="../assets/images/S_character3.png" class="sg-chara sg-chara-smooth" alt="" />

<!-- SMOOTH 票数 -->
<div class="sg-vote sg-vote-smooth">
  <span id="smooth-num">0</span><span class="sg-unit">票</span>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="../shared/firebase-config.js"></script>
<script src="../shared/vote-store.js"></script>
<script src="script.js"></script>
</body>
</html>
